# =============================================================================
# ros2_docker_template/docker-compose.dev.yml
# 개발(Dev) 환경 설정 — GUI 연동 및 소스 코드 바인드 마운트
# =============================================================================

include:
  - path: docker-compose.common.yml

# ── 개발 환경 전용 앵커 ────────────────────────────────────────────────────
x-gpu-devices: &gpu-devices
  devices:
    - /dev/dri:/dev/dri

x-dev-volumes: &dev-volumes
  - ${WORKSPACE_PATH:?WORKSPACE_PATH를 .env에 설정하세요}:/workspace:rw
  - ${GIT_CONFIG_PATH:-${HOME}/.gitconfig}:/root/.gitconfig:ro
  - ${SSH_PATH:-${HOME}/.ssh}:/root/.ssh:ro
  - ${DOCKER_DEV_CACHE_DIR:-${WORKSPACE_PATH}/.docker_cache}:/cache:rw
  - ${DEV_BUILD_VOL:-dev_build_data}:/workspace/build
  - ${DEV_INSTALL_VOL:-dev_install_data}:/workspace/install

x-ros-volumes: &ros-volumes
  - ${WORKSPACE_PATH:?WORKSPACE_PATH를 .env에 설정하세요}:/workspace:rw
  - ${GIT_CONFIG_PATH:-${HOME}/.gitconfig}:/root/.gitconfig:ro
  - ${SSH_PATH:-${HOME}/.ssh}:/root/.ssh:ro
  - ${DOCKER_DEV_CACHE_DIR:-${WORKSPACE_PATH}/.docker_cache}:/cache:rw
  - ${ROS_BUILD_VOL:-ros_build_data}:/workspace/build
  - ${ROS_INSTALL_VOL:-ros_install_data}:/workspace/install
  - ${ROS_LOG_VOL:-ros_log_data}:/workspace/log

# ── 개발 환경 서비스 공유 설정 앵커 ──────────────────────────────────────────
x-dev-shared: &dev-shared
  build: { target: dev }
  volumes: *dev-volumes
  command: ["bash", "-c", "${APP_COMMAND:-bash}"]

x-ros-dev-shared: &ros-dev-shared
  build: { target: ros }
  volumes: *ros-volumes
  command: ["bash", "-c", "${ROS_LAUNCH_COMMAND:-bash}"]

services:
  # ── 순수 C++/Python 서비스 ──────────────────────────────────────────────
  basic:
    extends:
      file: docker-compose.common.yml
      service: base-dev
    <<: *dev-shared
    container_name: ${COMPOSE_PROJECT_NAME}_basic

  basic-igpu:
    extends: basic
    profiles: ["igpu"]
    <<: *gpu-devices
    container_name: ${COMPOSE_PROJECT_NAME}_basic_igpu

  nvidia:
    extends:
      file: docker-compose.common.yml
      service: base-nvidia
    <<: *dev-shared
    profiles: ["nvidia"]
    container_name: ${COMPOSE_PROJECT_NAME}_nvidia

  # ── ROS 서비스 (기본) ───────────────────────────────────────────────────
  ros-basic:
    extends:
      file: docker-compose.common.yml
      service: base-ros
    <<: *ros-dev-shared
    container_name: ${COMPOSE_PROJECT_NAME}_ros_basic

  ros-igpu:
    extends: ros-basic
    profiles: ["ros-igpu"]
    <<: *gpu-devices
    container_name: ${COMPOSE_PROJECT_NAME}_ros_igpu

  ros-nvidia:
    extends:
      file: docker-compose.common.yml
      service: base-ros-nvidia
    <<: *ros-dev-shared
    profiles: ["ros-nvidia"]
    container_name: ${COMPOSE_PROJECT_NAME}_ros_nvidia

volumes:
  ros_build_data:
  ros_install_data:
  ros_log_data:
  dev_build_data:
  dev_install_data:
