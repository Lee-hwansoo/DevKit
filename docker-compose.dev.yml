# =============================================================================
# Dev-Template/docker-compose.dev.yml
# Development (Dev) Environment Configuration — GUI integration and Source Code Bind Mount
# =============================================================================
include:
  - path: docker-compose.common.yml

# ── Development Volume Mounting Anchors (Source Code & Persistence) ──────────
x-dev-volumes: &dev-volumes
  - ${HOST_X11_DIR:-/tmp/.X11-unix}:/tmp/.X11-unix:rw
  - ${HOST_XAUTHORITY:-/root/.Xauthority}:/root/.Xauthority:ro
  - ${HOST_XDG_RUNTIME_DIR:-/tmp/runtime-root}:/tmp/runtime-root:rw
  - ${WORKSPACE_PATH:-.}:/workspace:rw
  - ${GIT_CONFIG_PATH:-${HOST_GITCONFIG:-/dev/null}}:/root/.gitconfig:ro
  - ${SSH_PATH:-${HOST_SSH_DIR:-/dev/null}}:/root/.ssh:ro
  - ${HOST_CACHE_DIR:-${WORKSPACE_PATH:-.}/.docker_cache}:/cache:rw
  - ${DEV_BUILD_VOL:-dev_build_data}:/workspace/build
  - ${DEV_INSTALL_VOL:-dev_install_data}:/workspace/install
  - ${DEV_LOG_VOL:-dev_log_data}:/workspace/log

x-ros-volumes: &ros-volumes
  - ${HOST_X11_DIR:-/tmp/.X11-unix}:/tmp/.X11-unix:rw
  - ${HOST_XAUTHORITY:-/root/.Xauthority}:/root/.Xauthority:ro
  - ${HOST_XDG_RUNTIME_DIR:-/tmp/runtime-root}:/tmp/runtime-root:rw
  - ${WORKSPACE_PATH:-.}:/workspace:rw
  - ${GIT_CONFIG_PATH:-${HOST_GITCONFIG:-/dev/null}}:/root/.gitconfig:ro
  - ${SSH_PATH:-${HOST_SSH_DIR:-/dev/null}}:/root/.ssh:ro
  - ${HOST_CACHE_DIR:-${WORKSPACE_PATH:-.}/.docker_cache}:/cache:rw
  - ${ROS_BUILD_VOL:-ros_build_data}:/workspace/build
  - ${ROS_INSTALL_VOL:-ros_install_data}:/workspace/install
  - ${ROS_LOG_VOL:-ros_log_data}:/workspace/log

# ── Developer Service Shared Configuration (Target: dev) ─────────────────────
x-dev-shared: &dev-shared
  build:
    target: dev
  volumes: *dev-volumes
  command: ${APP_COMMAND:-bash}

x-ros-dev-shared: &ros-dev-shared
  build:
    target: ros
  volumes: *ros-volumes
  command: ${ROS_LAUNCH_COMMAND:-bash}

services:
  # [Pure Dev] Development Services
  basic-cpu:
    extends: { file: docker-compose.common.yml, service: base-dev }
    <<: *dev-shared
    profiles: ["basic-cpu"]

  basic-igpu:
    extends: { file: docker-compose.common.yml, service: base-igpu }
    <<: *dev-shared
    profiles: ["basic-igpu"]

  basic-nvidia:
    extends: { file: docker-compose.common.yml, service: base-nvidia }
    <<: *dev-shared
    profiles: ["basic-nvidia"]

  # [ROS] Development Services (Default Entry Point)
  ros-cpu:
    extends: { file: docker-compose.common.yml, service: base-ros }
    <<: *ros-dev-shared
    profiles: ["ros-cpu"]

  ros-igpu:
    extends: { file: docker-compose.common.yml, service: base-ros-igpu }
    <<: *ros-dev-shared
    profiles: ["ros-igpu"]

  ros-nvidia:
    extends: { file: docker-compose.common.yml, service: base-ros-nvidia }
    <<: *ros-dev-shared
    profiles: ["ros-nvidia"]

volumes:
  ros_build_data:
  ros_install_data:
  ros_log_data:
  dev_build_data:
  dev_install_data:
  dev_log_data:
