# =============================================================================
# ros2_docker_template/docker-compose.dev.yml
# 개발(Dev) 환경 설정 — GUI 연동 및 소스 코드 바인드 마운트
# =============================================================================
include:
  - path: docker-compose.common.yml

# ── 개발 환경 전용 볼륨 앵커 (Flat List) ──────────────────────────────────────
x-dev-volumes: &dev-volumes
  - /tmp/.X11-unix:/tmp/.X11-unix:rw
  - ${HOST_XAUTHORITY:-${HOME}/.Xauthority}:/root/.Xauthority:ro
  - ${HOST_XDG_RUNTIME_DIR:-/tmp/.docker_x11}:/tmp/runtime-root:rw
  - ${WORKSPACE_PATH:-.}:/workspace:rw
  - ${GIT_CONFIG_PATH:-${HOST_HOME:-${HOME}}/.gitconfig}:/root/.gitconfig:ro
  - ${SSH_PATH:-${HOST_HOME:-${HOME}}/.ssh}:/root/.ssh:ro
  - ${HOST_CACHE_DIR:-${WORKSPACE_PATH:-.}/.docker_cache}:/cache:rw
  - ${DEV_BUILD_VOL:-dev_build_data}:/workspace/build
  - ${DEV_INSTALL_VOL:-dev_install_data}:/workspace/install
  - ${DEV_LOG_VOL:-dev_log_data}:/workspace/log

x-ros-volumes: &ros-volumes
  - /tmp/.X11-unix:/tmp/.X11-unix:rw
  - ${HOST_XAUTHORITY:-${HOME}/.Xauthority}:/root/.Xauthority:ro
  - ${HOST_XDG_RUNTIME_DIR:-/tmp/.docker_x11}:/tmp/runtime-root:rw
  - ${WORKSPACE_PATH:-.}:/workspace:rw
  - ${GIT_CONFIG_PATH:-${HOST_HOME:-${HOME}}/.gitconfig}:/root/.gitconfig:ro
  - ${SSH_PATH:-${HOST_HOME:-${HOME}}/.ssh}:/root/.ssh:ro
  - ${HOST_CACHE_DIR:-${WORKSPACE_PATH:-.}/.docker_cache}:/cache:rw
  - ${ROS_BUILD_VOL:-ros_build_data}:/workspace/build
  - ${ROS_INSTALL_VOL:-ros_install_data}:/workspace/install
  - ${ROS_LOG_VOL:-ros_log_data}:/workspace/log

# ── 개발 환경 서비스 공유 설정 앵커 ──────────────────────────────────────────
x-dev-shared: &dev-shared
  build:
    target: dev
  volumes: *dev-volumes
  command: ${APP_COMMAND:-bash}

x-ros-dev-shared: &ros-dev-shared
  build:
    target: ros
  volumes: *ros-volumes
  command: ${ROS_LAUNCH_COMMAND:-bash}

services:
  # ── 순수 C++/Python 서비스 ──────────────────────────────────────────────
  basic-cpu:
    extends: { file: docker-compose.common.yml, service: base-dev }
    <<: *dev-shared
    profiles: ["basic-cpu"]

  basic-igpu:
    extends: { file: docker-compose.common.yml, service: base-igpu }
    <<: *dev-shared
    profiles: ["basic-igpu"]

  basic-nvidia:
    extends: { file: docker-compose.common.yml, service: base-nvidia }
    <<: *dev-shared
    profiles: ["basic-nvidia"]

  # ── ROS 서비스 (기본) ───────────────────────────────────────────────────
  ros-cpu:
    extends: { file: docker-compose.common.yml, service: base-ros }
    <<: *ros-dev-shared
    profiles: ["ros-cpu"]

  ros-igpu:
    extends: { file: docker-compose.common.yml, service: base-ros-igpu }
    <<: *ros-dev-shared
    profiles: ["ros-igpu"]

  ros-nvidia:
    extends: { file: docker-compose.common.yml, service: base-ros-nvidia }
    <<: *ros-dev-shared
    profiles: ["ros-nvidia"]

volumes:
  ros_build_data:
  ros_install_data:
  ros_log_data:
  dev_build_data:
  dev_install_data:
  dev_log_data:
