# =============================================================================
# docker-compose.prod.yml
# Compose file for Production Environment Deployment
# =============================================================================
include:
  - path: docker-compose.common.yml

# ── Production Runtime Configuration Anchors ─────────────────────────────────
x-prod-svc: &prod-svc
  restart: always

x-prod-volumes: &prod-volumes
  - ${PROD_LOG_VOL:-prod_log_data}:/workspace/log
  - ${WSL_LIB_DIR_MOUNT:-/tmp}:/usr/lib/wsl:ro

# ── Production Runtime Service Shared Configuration (Switch Strategy) ─────────
# Production security hardening — explicitly override dev defaults
# (privileged, host networking, etc.) for defense-in-depth.
x-ros-prod-shared: &ros-prod-shared
  <<: *prod-svc
  privileged: ${PRIVILEGED:-false}
  network_mode: ${NETWORK_MODE:-bridge}
  ipc: ${IPC_MODE:-private}
  image: ${COMPOSE_PROJECT_NAME}/ros-runtime:${IMAGE_TAG:-latest}
  build:
    target: ros-runtime
  volumes: *prod-volumes
  command: ${ROS_LAUNCH_COMMAND:-bash}

x-dev-prod-shared: &dev-prod-shared
  <<: *prod-svc
  privileged: ${PRIVILEGED:-false}
  network_mode: ${NETWORK_MODE:-bridge}
  ipc: ${IPC_MODE:-private}
  image: ${COMPOSE_PROJECT_NAME}/dev-runtime:${IMAGE_TAG:-latest}
  build:
    target: dev-runtime
  volumes: *prod-volumes
  command: ${APP_COMMAND:-bash}

services:
  # [ROS] Production-Grade Runtime Services (CPU/iGPU/NVIDIA)
  ros-cpu:
    extends: { file: docker-compose.common.yml, service: base-ros }
    <<: *ros-prod-shared
    profiles: ["ros-cpu"]

  ros-igpu:
    extends: { file: docker-compose.common.yml, service: base-ros-igpu }
    <<: *ros-prod-shared
    profiles: ["ros-igpu"]

  ros-nvidia:
    extends: { file: docker-compose.common.yml, service: base-ros-nvidia }
    <<: *ros-prod-shared
    profiles: ["ros-nvidia"]

  # [Pure Dev] Production-Grade Runtime Services (CPU/iGPU/NVIDIA)
  basic-cpu:
    extends: { file: docker-compose.common.yml, service: base-dev }
    <<: *dev-prod-shared
    profiles: ["basic-cpu"]

  basic-igpu:
    extends: { file: docker-compose.common.yml, service: base-igpu }
    <<: *dev-prod-shared
    profiles: ["basic-igpu"]

  basic-nvidia:
    extends: { file: docker-compose.common.yml, service: base-nvidia }
    <<: *dev-prod-shared
    profiles: ["basic-nvidia"]

volumes:
  prod_log_data:
