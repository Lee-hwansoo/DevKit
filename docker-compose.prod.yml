# =============================================================================
# ros2_docker_template/docker-compose.prod.yml
# 운영(Production) 환경 배포를 위한 컴포즈 파일
# =============================================================================
include:
  - path: docker-compose.common.yml

# ── 운영 환경 전용 앵커 ────────────────────────────────────────────────────
x-gpu-devices: &gpu-devices
  devices:
    - /dev/dri:/dev/dri

x-prod-svc: &prod-svc
  restart: always

# 배포 환경 전용 볼륨 (로그 등 영구 데이터)
x-prod-volumes: &prod-volumes
  - ${APP_LOG_VOL:-prod_log_data}:/opt/dockervol/prod/log

# ── 배포 환경 서비스 공유 설정 앵커 ──────────────────────────────────────────
x-ros-prod-shared: &ros-prod-shared
  <<: *prod-svc
  image: ${COMPOSE_PROJECT_NAME}/ros-runtime:${IMAGE_TAG:-latest}
  build:
    target: ros-runtime
  volumes: *prod-volumes
  command: ${ROS_LAUNCH_COMMAND:?ROS_LAUNCH_COMMAND를 .env에 설정하세요}

x-dev-prod-shared: &dev-prod-shared
  <<: *prod-svc
  image: ${COMPOSE_PROJECT_NAME}/dev-runtime:${IMAGE_TAG:-latest}
  build:
    target: dev-runtime
  volumes: *prod-volumes
  command: ${APP_COMMAND:?APP_COMMAND를 .env에 설정하세요}

services:
  # ── [ROS] 배포 서비스 (CPU/iGPU/NVIDIA) ─────────────────────────────────
  ros-prod:
    extends: base-ros
    <<: *ros-prod-shared
    profiles: ["ros"]

  ros-prod-igpu:
    extends: ros-prod
    profiles: ["ros-igpu"]
    <<: *gpu-devices

  ros-prod-nv:
    extends: base-ros-nvidia
    <<: *ros-prod-shared
    profiles: ["ros-nv"]

  # ── [Dev] 배포 서비스 (CPU/iGPU/NVIDIA) ──────────────────────────────────
  dev-prod:
    extends: base-dev
    <<: *dev-prod-shared
    profiles: ["dev"]

  dev-prod-igpu:
    extends: dev-prod
    profiles: ["dev-igpu"]
    <<: *gpu-devices

  dev-prod-nv:
    extends: base-nvidia
    <<: *dev-prod-shared
    profiles: ["dev-nv"]

volumes:
  prod_log_data:
